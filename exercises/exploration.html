<!DOCTYPE html>
<html>
<head>
<style>
div.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-start;
}

div.gallery-item {
  margin: 5px;
  border: 1px solid #ccc;
  width: 180px;
}

div.gallery-item:hover {
  border: 1px solid #777;
}

div.gallery-item img {
  width: 100%;
  height: auto;
}

div.gallery-item div.desc {
  padding: 15px;
  text-align: center;
}

.dropdown {
  position: relative;
}


.dropdown-content {
  display: none;
  position: absolute;
  background-color: #b77a7a;
  min-width: 130px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  padding: 12px 16px;
}

.dropdown:hover .dropdown-content {
  display: block;
}

.dropdowntext{
    color: rgb(155, 14, 38);
}


nav{
    grid-row: 2;
    font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
}

nav li{
    list-style-type: none;
    background-color: rgb(250, 243, 243);
    margin: 1rem;
}

nav a{
     text-decoration: none;
     color: #2e0f19;
     padding: 25px;
}

nav a:hover{
    color: rgb(187, 10, 69);
    background-color: rgb(250, 243, 243);
}

nav ul{
    display: flex;
    justify-content: center;
    background-color: rgb(250, 243, 243);
    padding: 25px;
    margin: 0;
    flex-wrap: wrap;
}

h1{
font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;

}


</style>
</head>
<body>
